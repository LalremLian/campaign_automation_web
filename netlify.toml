[build]
  command = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/marketing-dashboard run build"
  publish = "client/dist/public"

[build.environment]
  NODE_VERSION  = "20"
  PNPM_VERSION  = "11"
  NODE_ENV      = "development"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
