[build]
  # Run install + build from the monorepo root so workspace: deps resolve correctly
  command = "pnpm install && pnpm --filter @workspace/marketing-dashboard run build"
  publish = "client/dist/public"

[build.environment]
  NODE_VERSION  = "20"
  PNPM_VERSION  = "9"
  # Force full install (not --prod) so devDependencies are available during build
  NODE_ENV      = "development"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
